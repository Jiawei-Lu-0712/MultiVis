        // 显示提示信息
        function showToast(msg, type) {
            var toast = document.createElement('div');
            toast.innerText = msg;
            toast.style.position = 'fixed';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            
            // 根据类型设置不同的背景色
            if (type === 'success') {
                toast.style.background = 'linear-gradient(135deg, #10b981, #059669)';
            } else if (type === 'error') {
                toast.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)';
            } else if (type === 'info') {
                toast.style.background = 'linear-gradient(135deg, #3b82f6, #2563eb)';
            }
            
            toast.style.color = '#fff';
            toast.style.padding = '1rem 2rem';
            toast.style.borderRadius = '12px';
            toast.style.boxShadow = '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)';
            toast.style.zIndex = '10000';
            toast.style.bottom = '2rem';
            toast.style.fontWeight = '500';
            toast.style.textAlign = 'center';
            
            document.body.appendChild(toast);
            
            // 2秒后移除toast
            setTimeout(function() {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s ease';
                
                setTimeout(function() {
                    document.body.removeChild(toast);
                }, 500);
            }, 2000);
        }

        function showIterationPopup(containerId, iterationNumber) {
            /**
             * 在指定容器的右上角显示迭代弹窗，持续到下一次迭代
             * @param {string} containerId - 容器元素的ID
             * @param {number} iterationNumber - 迭代次数
             */
            // 找到对应的容器
            const container = document.getElementById(containerId);
            
            if (!container) {
                console.warn(`Container ${containerId} not found`);
                return;
            }
            
            // 移除之前的弹窗（如果存在）
            const popupKey = containerId === 'codeArea' ? 'codeArea' : 'chartArea';
            if (currentPopups[popupKey]) {
                currentPopups[popupKey].remove();
                currentPopups[popupKey] = null;
            }
            
            // 确保容器有relative定位
            const originalPosition = container.style.position;
            if (!originalPosition || originalPosition === 'static') {
                container.style.position = 'relative';
            }
            
            // 创建弹窗元素
            const popup = document.createElement('div');
            popup.className = 'iteration-popup';
            popup.textContent = `Iteration ${iterationNumber}`;
            
            // 添加到容器中
            container.appendChild(popup);
            
            // 保存弹窗引用
            currentPopups[popupKey] = popup;
            
            console.log(`Iteration ${iterationNumber} popup shown in ${containerId} right corner`);
        }

        function showFinalResultPopup(containerId) {
            /**
             * 在指定容器的右上角显示最终结果弹窗，持续1秒
             * @param {string} containerId - 容器元素的ID
             */
            // 找到对应的容器
            const container = document.getElementById(containerId);
            
            if (!container) {
                console.warn(`Container ${containerId} not found`);
                return;
            }
            
            // 移除之前的迭代弹窗（如果存在）
            const popupKey = containerId === 'codeArea' ? 'codeArea' : 'chartArea';
            if (currentPopups[popupKey]) {
                currentPopups[popupKey].remove();
                currentPopups[popupKey] = null;
            }
            
            // 确保容器有relative定位
            const originalPosition = container.style.position;
            if (!originalPosition || originalPosition === 'static') {
                container.style.position = 'relative';
            }
            
            // 创建最终结果弹窗元素
            const popup = document.createElement('div');
            popup.className = 'final-result-popup';
            popup.textContent = 'Final Result';
            
            // 添加到容器中
            container.appendChild(popup);
            
            // 1秒后移除弹窗
            setTimeout(() => {
                if (container.contains(popup)) {
                    container.removeChild(popup);
                }
                // 恢复原始定位样式（如果需要）
                if (!originalPosition || originalPosition === 'static') {
                    container.style.position = '';
                }
            }, 1000);
            
            console.log(`Final Result popup shown in ${containerId} right corner`);
        }
        
        // Reference Preview 逻辑
        function updateReferencePreview(ctx) {
            try {
                const refWrapper = document.getElementById('refPreviewWrapper');
                const refArea = document.getElementById('refArea');
                const downloadRefBtn = document.getElementById('downloadRefBtn');
                if (!refWrapper || !refArea) return;

                // 首先检查是否有从历史记录加载的Reference Preview数据
                const referencePreviewData = sessionStorage.getItem('reference_preview_data');
                if (referencePreviewData) {
                    try {
                        const previewData = JSON.parse(referencePreviewData);
                        console.log('Loading Reference Preview from history:', previewData);
                        
                        if (previewData.has_json && previewData.json_content) {
                            refWrapper.style.display = 'block';
                            refArea.className = 'generated-code has-interactive-chart';
                            refArea.innerHTML = '<div id="ref_vis" style="width:100%;height:100%;"></div>';

                            const embedOptions = {
                                actions: true,
                                renderer: 'canvas',
                                theme: 'light',
                                hover: true,
                                tooltip: true,
                                downloadFileName: 'reference_visualization',
                                background: '#ffffff',
                                width: 'container',
                                height: 'container'
                            };

                            // 使用历史记录中的JSON内容直接渲染
                            const spec = previewData.json_content;
                            
                            // 应用与主图相同的清理逻辑
                            if (spec.encoding && spec.encoding.color && spec.encoding.color.condition && 
                                spec.encoding.color.condition.test && 
                                spec.encoding.color.condition.test.field && 
                                spec.encoding.color.condition.test.gt !== undefined) {
                                delete spec.encoding.color.condition;
                            }

                            if (spec.params) {
                                spec.params = spec.params.filter(param => {
                                    if (param.name && (param.name.includes('threshold') || param.name.includes('slider'))) {
                                        return false;
                                    }
                                    return true;
                                });
                            }

                            if (spec.signals) {
                                spec.signals = spec.signals.filter(signal => {
                                    if (signal.name && (signal.name.includes('threshold') || signal.name.includes('slider'))) {
                                        return false;
                                    }
                                    return true;
                                });
                            }

                            if (typeof spec.mark === 'object') {
                                spec.mark.tooltip = true;
                            } else if (typeof spec.mark === 'string') {
                                spec.mark = {type: spec.mark, tooltip: true};
                            }

                            if (!spec.config) spec.config = {};
                            if (!spec.config.mark) spec.config.mark = {};
                            spec.config.mark.tooltip = true;

                            const hasDiscreteScales = spec.encoding && (
                                (spec.encoding.x && (spec.encoding.x.type === 'nominal' || spec.encoding.x.type === 'ordinal')) ||
                                (spec.encoding.y && (spec.encoding.y.type === 'nominal' || spec.encoding.y.type === 'ordinal'))
                            );
                            if (!hasDiscreteScales) {
                                if (!spec.params) spec.params = [];
                                spec.params.push({ name: 'grid', select: 'interval', bind: 'scales' });
                            }

                            if (spec.mark === 'bar' || (typeof spec.mark === 'object' && spec.mark.type === 'bar')) {
                                if (!spec.config.hover) spec.config.hover = {};
                                spec.config.hover.fill = 'goldenrod';
                                spec.config.hover.stroke = 'black';
                                spec.config.hover.strokeWidth = 2;
                                spec.config.hover.cursor = 'pointer';
                            }

                            if (!spec.config) spec.config = {};
                            if (!spec.config.background) spec.config.background = '#ffffff';
                            if (!spec.config.view) spec.config.view = {};
                            if (!spec.config.view.fill) spec.config.view.fill = '#ffffff';

                            spec.width = 'container';
                            spec.height = 'container';
                            spec.autosize = { type: 'fit', contains: 'padding' };

                            if (spec.mark === 'line' || (typeof spec.mark === 'object' && spec.mark.type === 'line')) {
                                if (typeof spec.mark === 'object') {
                                    spec.mark.point = true;
                                    spec.mark.tooltip = true;
                                } else {
                                    spec.mark = {type: 'line', point: true, tooltip: true};
                                }
                            }

                            function removeThresholdReferences(obj) {
                                if (!obj || typeof obj !== 'object') return;
                                Object.keys(obj).forEach(key => {
                                    if (obj[key] && typeof obj[key] === 'object') {
                                        removeThresholdReferences(obj[key]);
                                    }
                                    if (typeof obj[key] === 'string' && (obj[key].includes('threshold') || obj[key].includes('slider') || obj[key].includes('bind'))) {
                                        delete obj[key];
                                    }
                                    if (key === 'threshold' || key.includes('threshold') || key.includes('slider')) {
                                        delete obj[key];
                                    }
                                });
                            }
                            removeThresholdReferences(spec);

                            // 确保 vegaEmbed 可用
                            window.ensureVegaEmbed().then(() => {
                                return vegaEmbed('#ref_vis', spec, embedOptions);
                            }).then(result => {
                                if (result.view && result.view.warn) {
                                    const originalWarn = result.view.warn;
                                    result.view.warn = function(message) {
                                        if (message && typeof message === 'string' && (
                                            message.includes('threshold') || message.includes('slider') ||
                                            message.includes('Scale bindings') || message.includes('continuous domains') ||
                                            message.includes('Dropping "fit') || message.includes('discrete width')
                                        )) {
                                            return;
                                        }
                                        originalWarn.apply(this, arguments);
                                    };
                                }
                                
                                // 确保画布充满父容器
                                try {
                                    const embed = document.querySelector('#ref_vis').closest('.vega-embed');
                                    if (embed) {
                                        embed.style.width = '95%';
                                        embed.style.height = '95%';
                                        embed.style.margin = 'auto';
                                    }
                                } catch(e) {}

                                if (downloadRefBtn) {
                                    downloadRefBtn.style.display = 'inline-block';
                                    downloadRefBtn.onclick = function() {
                                        // 尝试从Vega视图导出PNG
                                        const visElement = document.querySelector('#ref_vis .vega-embed');
                                        if (visElement && visElement.view) {
                                            visElement.view.toImageURL('png').then(function(url) {
                                                const a = document.createElement('a');
                                                a.href = url;
                                                a.download = 'reference_visualization.png';
                                                document.body.appendChild(a);
                                                a.click();
                                                document.body.removeChild(a);
                                            }).catch(function(error) {
                                                console.error('导出Reference Preview PNG失败:', error);
                                            });
                                        }
                                    };
                                }
                                
                                // 清除sessionStorage中的数据
                                sessionStorage.removeItem('reference_preview_data');
                            }).catch(error => {
                                console.error('渲染历史记录Reference Preview失败:', error);
                                refArea.className = 'generated-code';
                                refArea.textContent = 'Failed to render reference preview from history';
                            });
                            
                            return; // 成功加载历史记录数据后直接返回
                        }
                    } catch (parseError) {
                        console.error('解析历史记录Reference Preview数据失败:', parseError);
                        sessionStorage.removeItem('reference_preview_data');
                    }
                }

                const uploadedImageNameTmpl = document.getElementById('tmpl_uploaded_image_name');
                const uploadedCodeTmpl = document.getElementById('tmpl_uploaded_code');
                const uploadedImageName = (ctx && ctx.uploaded_image_name) || (uploadedImageNameTmpl ? JSON.parse(uploadedImageNameTmpl.textContent || '""') : '');
                const uploadedCode = (ctx && ctx.uploaded_code) || (uploadedCodeTmpl ? JSON.parse(uploadedCodeTmpl.textContent || '""') : '');

                // 情况1：有参考图片
                if (uploadedImageName) {
                    refWrapper.style.display = 'block';
                    const imgUrl = `/history/input/${uploadedImageName}`;
                    refArea.className = 'generated-code has-image';
                    refArea.style.backgroundColor = '#ffffff';
                    refArea.innerHTML = `<img src="${imgUrl}" alt="reference" onload="addImageClickEvent(this)">`;
                    if (downloadRefBtn) {
                        downloadRefBtn.style.display = 'inline-block';
                        downloadRefBtn.onclick = function() {
                            const a = document.createElement('a');
                            a.href = imgUrl; a.download = 'reference.png'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
                        };
                    }
                    return;
                }

                // 情况2：有参考代码
                if (uploadedCode && uploadedCode.trim()) {
                    refWrapper.style.display = 'block';
                    refArea.className = 'generated-code';
                    refArea.textContent = 'Executing reference code...';
                    fetch('/execute_reference_preview', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code: uploadedCode })
                    }).then(r => r.json()).then(resp => {
                        if (!resp.success) {
                            refArea.className = 'generated-code';
                            refArea.textContent = 'Failed to execute reference code';
                            return;
                        }
                        const { img_path, json_path } = resp;
                        if (json_path) {
                            refArea.className = 'generated-code has-interactive-chart';
                            refArea.innerHTML = '<div id="ref_vis" style="width:100%;height:100%;"></div>';

                            const embedOptions = {
                                actions: true,
                                renderer: 'canvas',
                                theme: 'light',
                                hover: true,
                                tooltip: true,
                                downloadFileName: 'visualization',
                                background: '#ffffff',
                                // 让 vega-embed 占满父容器
                                width: 'container',
                                height: 'container'
                            };

                            fetch(json_path)
                              .then(response => {
                                  if (!response.ok) {
                                      throw new Error(`Failed to load chart JSON: ${response.status} ${response.statusText}`);
                                  }
                                  return response.json();
                              })
                              .then(spec => {
                                  // 与主图相同的交互与清理逻辑
                                  if (spec.encoding && spec.encoding.color && spec.encoding.color.condition && 
                                      spec.encoding.color.condition.test && 
                                      spec.encoding.color.condition.test.field && 
                                      spec.encoding.color.condition.test.gt !== undefined) {
                                      delete spec.encoding.color.condition;
                                  }

                                  if (spec.params) {
                                      spec.params = spec.params.filter(param => {
                                          if (param.name && (param.name.includes('threshold') || param.name.includes('slider'))) {
                                              return false;
                                          }
                                          return true;
                                      });
                                  }

                                  if (spec.signals) {
                                      spec.signals = spec.signals.filter(signal => {
                                          if (signal.name && (signal.name.includes('threshold') || signal.name.includes('slider'))) {
                                              return false;
                                          }
                                          return true;
                                      });
                                  }

                                  if (typeof spec.mark === 'object') {
                                      spec.mark.tooltip = true;
                                  } else if (typeof spec.mark === 'string') {
                                      spec.mark = {type: spec.mark, tooltip: true};
                                  }

                                  if (!spec.config) spec.config = {};
                                  if (!spec.config.mark) spec.config.mark = {};
                                  spec.config.mark.tooltip = true;

                                  const hasDiscreteScales = spec.encoding && (
                                      (spec.encoding.x && (spec.encoding.x.type === 'nominal' || spec.encoding.x.type === 'ordinal')) ||
                                      (spec.encoding.y && (spec.encoding.y.type === 'nominal' || spec.encoding.y.type === 'ordinal'))
                                  );
                                  if (!hasDiscreteScales) {
                                      if (!spec.params) spec.params = [];
                                      spec.params.push({ name: 'grid', select: 'interval', bind: 'scales' });
                                  }

                                  if (spec.mark === 'bar' || (typeof spec.mark === 'object' && spec.mark.type === 'bar')) {
                                      if (!spec.config.hover) spec.config.hover = {};
                                      spec.config.hover.fill = 'goldenrod';
                                      spec.config.hover.stroke = 'black';
                                      spec.config.hover.strokeWidth = 2;
                                      spec.config.hover.cursor = 'pointer';
                                  }

                                  if (!spec.config) spec.config = {};
                                  if (!spec.config.background) spec.config.background = '#ffffff';
                                  if (!spec.config.view) spec.config.view = {};
                                  if (!spec.config.view.fill) spec.config.view.fill = '#ffffff';

                                  spec.width = 'container';
                                  spec.height = 'container';
                                  spec.autosize = { type: 'fit', contains: 'padding' };

                                  if (spec.mark === 'line' || (typeof spec.mark === 'object' && spec.mark.type === 'line')) {
                                      if (typeof spec.mark === 'object') {
                                          spec.mark.point = true;
                                          spec.mark.tooltip = true;
                                      } else {
                                          spec.mark = {type: 'line', point: true, tooltip: true};
                                      }
                                  }

                                  function removeThresholdReferences(obj) {
                                      if (!obj || typeof obj !== 'object') return;
                                      Object.keys(obj).forEach(key => {
                                          if (obj[key] && typeof obj[key] === 'object') {
                                              removeThresholdReferences(obj[key]);
                                          }
                                          if (typeof obj[key] === 'string' && (obj[key].includes('threshold') || obj[key].includes('slider') || obj[key].includes('bind'))) {
                                              delete obj[key];
                                          }
                                          if (key === 'threshold' || key.includes('threshold') || key.includes('slider')) {
                                              delete obj[key];
                                          }
                                      });
                                  }
                                  removeThresholdReferences(spec);

                                  // 完全填充父容器
                                  const refVis = document.getElementById('ref_vis');
                                  if (refVis) {
                                      refVis.style.width = '90%';
                                      refVis.style.height = '90%';
                                      refVis.style.margin = 'auto';
                                  }
                                  // 确保 vegaEmbed 可用
                                  return window.ensureVegaEmbed().then(() => {
                                      return vegaEmbed('#ref_vis', spec, embedOptions);
                                  });
                              })
                              .then(result => {
                                  if (result.view && result.view.warn) {
                                      const originalWarn = result.view.warn;
                                      result.view.warn = function(message) {
                                          if (message && typeof message === 'string' && (
                                              message.includes('threshold') || message.includes('slider') ||
                                              message.includes('Scale bindings') || message.includes('continuous domains') ||
                                              message.includes('Dropping "fit') || message.includes('discrete width')
                                          )) {
                                              return;
                                          }
                                          originalWarn.apply(this, arguments);
                                      };
                                  }
                                  // 确保画布充满父容器，禁用滚动
                                  try {
                                      const embed = document.querySelector('#ref_vis').closest('.vega-embed');
                                      if (embed) {
                                          embed.style.width = '95%';
                                          embed.style.height = '95%';
                                          embed.style.margin = 'auto';
                                      }
                                  } catch(e) {}

                                  if (downloadRefBtn) {
                                      downloadRefBtn.style.display = 'inline-block';
                                      downloadRefBtn.onclick = function() {
                                          const a = document.createElement('a');
                                          a.href = img_path || '#'; a.download = 'reference.png'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
                                      };
                                  }
                              })
                              .catch(() => {
                                  refArea.className = 'generated-code has-image';
                                  refArea.innerHTML = `<img src="${img_path}" alt="reference" onload="addImageClickEvent(this)">`;
                                  if (downloadRefBtn) {
                                      downloadRefBtn.style.display = 'inline-block';
                                      downloadRefBtn.onclick = function() {
                                          const a = document.createElement('a');
                                          a.href = img_path; a.download = 'reference.png'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
                                      };
                                  }
                              });
                        } else if (img_path) {
                            refArea.className = 'generated-code has-image';
                            refArea.innerHTML = `<img src="${img_path}" alt="reference" onload="addImageClickEvent(this)">`;
                            if (downloadRefBtn) {
                                downloadRefBtn.style.display = 'inline-block';
                                downloadRefBtn.onclick = function() {
                                    const a = document.createElement('a');
                                    a.href = img_path; a.download = 'reference.png'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
                                };
                            }
                        } else {
                            refWrapper.style.display = 'none';
                        }
                    }).catch(() => {
                        refArea.className = 'generated-code';
                        refArea.textContent = 'Failed to execute reference code';
                    });
                    return;
                }

                // 情况3：无参考
                refWrapper.style.display = 'none';
            } catch (e) {
                console.error('updateReferencePreview error:', e);
            }
        }

        </script>
        <!-- 模板数据容器，避免在JS中直接嵌入Jinja 表达式 -->
        <script id="tmpl_is_history" type="application/json">{{ is_history_result|default(false)|tojson }}</script>
        <script id="tmpl_vis_code" type="application/json">{{ vis_code|default('')|tojson }}</script>
        <script id="tmpl_chart_json" type="application/json">{{ chart_json|default('')|tojson }}</script>
        <script id="tmpl_chart_img" type="application/json">{{ chart_img|default('')|tojson }}</script>
        <script id="tmpl_eval_result" type="application/json">{{ eval_result|default('')|tojson }}</script>
        <script id="tmpl_uploaded_image_name" type="application/json">{{ uploaded_image_name|default('')|tojson }}</script>
        <script id="tmpl_original_image_name" type="application/json">{{ original_image_name|default('')|tojson }}</script>
        <script id="tmpl_uploaded_code" type="application/json">{{ uploaded_code|default('')|tojson }}</script>
        <script>
        // 页面加载时处理
        /* 忽略下面的JavaScript语法错误，它们是由Jinja2模板语法引起的 */
        /* eslint-disable */
        document.addEventListener('DOMContentLoaded', function() {
            // 确保代码区域的滚动条正常工作
            setupCodeScrolling();
            
            // 监听窗口大小变化，调整图表大小
            window.addEventListener('resize', function() {
                resizeVegaChart();
            });
            
            // 检查是否有历史结果数据
            // 从隐藏的模板数据容器中获取各个字段
            const isHistoryResult = JSON.parse(document.getElementById('tmpl_is_history').textContent || 'false');
            
            if (isHistoryResult) {
                console.log('Loading from history results (direct variables)');
                
                // 更新代码 - 从模板数据容器解析
                const visCode = JSON.parse(document.getElementById('tmpl_vis_code').textContent || '""');
                if (visCode) {
                    setCodeWithHighlight(visCode);
                }
                
                // 更新图表 - 优先使用JSON格式的交互式图表
                const chartJson = JSON.parse(document.getElementById('tmpl_chart_json').textContent || '""');
                const chartImg = JSON.parse(document.getElementById('tmpl_chart_img').textContent || '""');
                
                if (chartJson) {
                    console.log('Loading from history JSON chart:', chartJson);
                    updateChartDisplay(chartJson);
                } else if (chartImg) {
                    console.log('Loading from history image chart:', chartImg);
                    updateChartDisplay(chartImg);
                }
                
                // Reference Preview（历史）
                const evalResult = JSON.parse(document.getElementById('tmpl_eval_result').textContent || '""');
                const uploadedImageName = JSON.parse(document.getElementById('tmpl_uploaded_image_name').textContent || '""');
                const uploadedCode = JSON.parse(document.getElementById('tmpl_uploaded_code').textContent || '""');
                updateReferencePreview({
                    eval_result: evalResult,
                    uploaded_image_name: uploadedImageName,
                    uploaded_code: uploadedCode
                });

                // 若无参考图片也无参考代码，则使右上代码区填充两行高度
                try {
                    const hasReference = (uploadedImageName && uploadedImageName.length > 0) || (uploadedCode && uploadedCode.trim().length > 0);
                    const codeContainer = document.querySelector('.code-container');
                    const refWrapper = document.getElementById('refPreviewWrapper');
                    if (!hasReference && codeContainer && refWrapper) {
                        refWrapper.style.display = 'none';
                        codeContainer.classList.add('full-height');
                    }
                } catch (e) { console.log(e); }
            } else if (getUrlParam('session_id')) {
                // 如果有session_id，连接到进度流
                connectToProgressStream();
                // 无历史时，根据是否有参考信息决定右上代码区高度
                try {
                    const uploadedImageName = JSON.parse(document.getElementById('tmpl_uploaded_image_name').textContent || '""');
                    const uploadedCode = JSON.parse(document.getElementById('tmpl_uploaded_code').textContent || '""');
                    const codeContainer = document.querySelector('.code-container');
                    const refWrapper = document.getElementById('refPreviewWrapper');
                    const hasReference = (uploadedImageName && uploadedImageName.length > 0) || (uploadedCode && uploadedCode.trim().length > 0);
                    if (!hasReference && codeContainer && refWrapper) {
                        refWrapper.style.display = 'none';
                        codeContainer.classList.add('full-height');
                    }
                } catch (e) { console.log(e); }
            } else {
                // 既没有历史结果也没有session_id，显示错误
                document.getElementById('chartArea').innerHTML = '<div class="error-message">Unable to load result, insufficient parameters</div>';
                document.getElementById('codeArea').innerHTML = '<code class="python">-- No available code --</code>';
            }
        });
        /* eslint-enable */
        
        // 调整Vega图表大小的函数
        function resizeVegaChart() {
            const chartArea = document.getElementById('chartArea');
            if (chartArea && chartArea.classList.contains('has-interactive-chart')) {
                const vegaEmbedContainer = document.querySelector('.vega-embed');
                if (vegaEmbedContainer) {
                    // 设置容器样式
                    vegaEmbedContainer.style.width = '100%';
                    vegaEmbedContainer.style.height = '100%';
                    
                    // 处理canvas元素
                    const canvasElements = vegaEmbedContainer.querySelectorAll('canvas');
                    canvasElements.forEach(canvas => {
                        canvas.style.width = '100%';
                        canvas.style.height = '100%';
                    });
                    
                    // 如果有Vega视图对象，尝试调用其重绘方法
                    if (vegaEmbedContainer.__vegaEmbed && vegaEmbedContainer.__vegaEmbed.view) {
                        try {
                            // 尝试调用重绘方法
                            vegaEmbedContainer.__vegaEmbed.view.resize();
                        } catch (e) {
                            console.error('调整Vega图表大小失败:', e);
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>
