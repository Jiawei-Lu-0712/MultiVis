    <!-- 确保 vega-embed 库正确加载的检查脚本 -->
    <script>
        // 全局变量用于跟踪 vega-embed 库的加载状态
        window.vegaEmbedReady = false;
        window.vegaEmbedRetryCount = 0;
        window.maxVegaEmbedRetries = 3;
        
        // 检查 vega-embed 库是否正确加载
        function checkVegaEmbed() {
            if (typeof vegaEmbed !== 'undefined') {
                window.vegaEmbedReady = true;
                console.log('vegaEmbed 库已正确加载');
                return true;
            }
            return false;
        }
        
        // 动态加载 vega-embed 库
        function loadVegaEmbed() {
            return new Promise((resolve, reject) => {
                if (window.vegaEmbedRetryCount >= window.maxVegaEmbedRetries) {
                    reject(new Error('vega-embed 库加载失败，已达到最大重试次数'));
                    return;
                }
                
                window.vegaEmbedRetryCount++;
                console.log(`尝试加载 vega-embed 库 (第 ${window.vegaEmbedRetryCount} 次)`);
                
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/vega-embed@6';
                script.onload = function() {
                    if (checkVegaEmbed()) {
                        resolve();
                    } else {
                        reject(new Error('vega-embed 库加载后仍未定义'));
                    }
                };
                script.onerror = function() {
                    reject(new Error('vega-embed 库加载失败'));
                };
                document.head.appendChild(script);
            });
        }
        
        // 确保 vegaEmbed 可用的函数
        window.ensureVegaEmbed = function() {
            return new Promise((resolve, reject) => {
                if (checkVegaEmbed()) {
                    resolve();
                    return;
                }
                
                loadVegaEmbed()
                    .then(() => resolve())
                    .catch((error) => {
                        console.error('vega-embed 库加载失败:', error);
                        reject(error);
                    });
            });
        };
        
        // 页面加载完成后检查
        window.addEventListener('load', function() {
            if (!checkVegaEmbed()) {
                console.warn('vegaEmbed 未定义，将在需要时动态加载');
                // 在控制台显示更详细的信息
                console.log('当前页面加载的脚本:', Array.from(document.scripts).map(s => s.src));
            } else {
                console.log('所有 vega 相关库已正确加载');
            }
        });
    </script>
    <style>

            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;

        .progress-content::-webkit-scrollbar {

        }
        
        .progress-content::-webkit-scrollbar-track {

            border-radius: 2px;
        }
        
        .progress-content::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.5);
            border-radius: 2px;
        }
        
        .progress-content::-webkit-scrollbar-thumb:hover {
            background: rgba(156, 163, 175, 0.7);
        }
        
        /* 迭代弹窗样式 */
        .iteration-popup {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            z-index: 2147483647;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 700;
            box-shadow: linear-gradient(135deg, #667eea, #764ba2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            opacity: 1;
            pointer-events: none;
            white-space: nowrap;
        }

        /* 最终结果弹窗样式 */
        .final-result-popup {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            z-index: 2147483647;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 700;
            box-shadow: linear-gradient(135deg, #667eea, #764ba2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            opacity: 0;
            animation: finalResultPopupShow 1s ease-in-out;
            pointer-events: none;
            white-space: nowrap;
        }

        /* 将弹窗定位到 Visualization Code 标题白色区域内并垂直居中 */
        .code-container .result-title { position: relative; }
        .code-container .result-title .iteration-popup,
        .code-container .result-title .final-result-popup {
            top: 6px; /* 不垂直居中，靠近顶部 */
            right: 0.75rem; /* 向右移动一点 */
            transform: none;
            z-index: 2147483647;
        }
        
        @keyframes finalResultPopupShow {
            0% {
                opacity: 0;
                transform: translateX(20px) scale(0.8);
            }
            20% {
                opacity: 1;
                transform: translateX(0) scale(1.05);
            }
            80% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateX(20px) scale(0.9);
            }
        }
        
        :root {

            --secondary-color: #0ea5e9; /* 次级主色（按钮默认） */
            --accent-color: #22d3ee; /* 强调色（悬停与装饰） */
            --light-color: #f8fafc;
            --dark-color: #0b1220;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --info-color: #3b82f6;
            --border-radius: 12px;
            --box-shadow: 0 10px 30px rgba(2, 6, 23, 0.15);
            --transition: all 0.25s ease;
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-border: 1px solid rgba(15, 23, 42, 0.08);
            --glass-blur: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

            line-height: 1.6;
            color: var(--dark-color);
            background: radial-gradient(1200px 800px at 10% 0%, rgba(34, 211, 238, 0.15), transparent 60%),
                        radial-gradient(1000px 700px at 90% 10%, rgba(59, 130, 246, 0.12), transparent 60%),
                        linear-gradient(135deg, #6366f1 0%, #7c3aed 100%);
            min-height: 100vh;
            padding: 0;
            margin: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 10px 20px;
            backdrop-filter: blur(10px);
        }

        header {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(2, 6, 23, 0.98));
            color: white;
            padding: 12px 0;
            box-shadow: 0 10px 30px rgba(2, 6, 23, 0.25);
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
            backdrop-filter: blur(12px);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.2px;
        }

        .logo i {
            margin-right: 10px;
            font-size: 28px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            color: white;
            border: 0;
            border-radius: 999px;
            cursor: pointer;
            font-size: 14px;

            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.25);

        .btn:focus-visible {

        }

        .btn i {

        }

        .btn-primary {

            box-shadow: 0 8px 20px rgba(6, 182, 212, 0.25);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.6);
            color: white;
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.85);
        }

        .results-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            column-gap: 20px; /* 保持列间距不变 */
            row-gap: 0px; /* 第二行整体上移，消除两行间距 */
            height: calc(100vh - 450px);
            margin-top: 18px;
        }

        .result-item {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            padding: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(var(--glass-blur));
            border: var(--card-border);
            transition: var(--transition);
        }
        .result-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 40px rgba(2, 6, 23, 0.18);
        }

        .result-section {
            margin-bottom: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .result-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(15, 23, 42, 0.08);
        }

        .result-title span {
            font-weight: 700;
            font-size: 16px;
            color: var(--primary-color);
        }

        .result-title .actions {
            display: flex;
            gap: 10px;
        }

        .result-title .btn-icon {
            background: rgba(148, 163, 184, 0.15);
            border: 1px solid rgba(148, 163, 184, 0.25);
            color: #334155;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .result-title .btn-icon:hover {
            color: #0f172a;
            background: rgba(148, 163, 184, 0.25);
            border-color: rgba(148, 163, 184, 0.35);
            transform: translateY(-1px);
        }

        .chart-container {
            grid-column: 1;
            grid-row: 1 / span 2;
            overflow: auto;
            background-color: #ffffff;
            border-radius: var(--border-radius);
            max-height: 100%;
            height: 76.5vh; /* 与右侧 code(40vh)+eval(33.5vh) 对齐 */
        }

        .chart-display {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            overflow: hidden;
            position: relative;
            background-color: #ffffff;
            border-radius: 8px;
            padding: 0;
        }

        .chart-display img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            background-color: #ffffff;
            border-radius: 8px;
        }

        .code-container {
            grid-column: 2;
            grid-row: 1;
            overflow: hidden;
            max-height: 100%;
            height: calc(40vh - 45px); /* 第一行减少5px */
            align-self: start; /* 顶部对齐 */
        }

        /* 当无参考信息时，代码区充满两行，与左侧图一致高度 */
        .code-container.full-height {
            grid-row: 1 / span 2;
            height: 76.5vh;
        }

        .code-wrapper {
            position: relative;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            max-height: 100%;
        }

        .generated-code {
            height: 100%;
            width: 100%;
            overflow-y: auto; /* 垂直滚动 */
            overflow-x: auto; /* 水平滚动 */
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: clamp(12px, 1.2vw, 16px);
            line-height: 1.5;
            padding: 15px;
            padding-bottom: 16px; /* 增加底部padding，为滚动条腾出空间 */
            margin: 0;
            border-radius: 12px;
            background: #0b0f17;
            color: #f3f4f6;
            white-space: pre; /* 支持水平滚动，不自动换行 */
            border: 1px solid rgba(148, 163, 184, 0.15);
            /* 添加Firefox滚动条样式 */
            scrollbar-width: thin;
            scrollbar-color: rgba(156, 163, 175, 0.5) rgba(31, 41, 55, 0.5);
            position: relative; /* 确保相对定位，用于滑动条定位 */
            max-width: 100%; /* 确保内容不会超出容器 */
        }
        
        /* 为generated-code添加自定义滚动条样式 */
        .generated-code::-webkit-scrollbar {
            width: 6px;
            height: 6px; /* 增加水平滚动条高度，使其更明显 */
            background: transparent;
        }
        
        .generated-code::-webkit-scrollbar-track {
            background: rgba(31, 41, 55, 0.5);
            border-radius: 2px;
        }
        
        .generated-code::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.5);
            border-radius: 2px;
        }
        
        .generated-code::-webkit-scrollbar-thumb:hover {
            background: rgba(156, 163, 175, 0.7);
        }
        
        /* 特别强调水平滚动条 */
        .generated-code::-webkit-scrollbar:horizontal {
            height: 15px; /* 水平滚动条更高 */
        }
        
        .generated-code::-webkit-scrollbar-thumb:horizontal {
            background: rgba(156, 163, 175, 0.7); /* 水平滚动条颜色更明显 */
            border-radius: 2px;
        }
        
        /* 滚动时的滚动条样式 */
        .generated-code.scrolling::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.8);
        }
        
        /* 确保codeArea的水平滚动条与evalArea一致 */
        #codeArea::-webkit-scrollbar:horizontal {
            height: 15px; /* 水平滚动条更高 */
        }
        
        #codeArea::-webkit-scrollbar-thumb:horizontal {
            background: rgba(156, 163, 175, 0.7); /* 水平滚动条颜色更明显 */
            border-radius: 2px;
        }
        
        #codeArea.has-h-scroll::-webkit-scrollbar-thumb:horizontal {
            background: rgba(156, 163, 175, 0.9); /* 更明显的颜色 */
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3); /* 添加边框使其更明显 */
        }
        
        /* 确保滚动条角落样式一致 */
        .generated-code::-webkit-scrollbar-corner {
            background: #000000;
        }
        
        /* 为代码区域添加水平滚动条指示器 */
        .code-wrapper::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, 
                rgba(156, 163, 175, 0.3) 0%, 
                rgba(156, 163, 175, 0.5) 50%, 
                rgba(156, 163, 175, 0.3) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 0 0 12px 12px;
            pointer-events: none;
            z-index: 10;
        }
        
        /* 当有水平溢出时显示滑动条指示器 */
        .code-wrapper:hover::after,
        .code-wrapper.has-h-scroll::after {
            opacity: 0.8;
        }
        
        /* 当代码区域有水平滚动时添加视觉提示 */
        .code-wrapper.has-h-scroll .generated-code::-webkit-scrollbar-thumb:horizontal {
            background: rgba(156, 163, 175, 0.9); /* 更明显的颜色 */
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3); /* 添加边框使其更明显 */
        }
        
        /* 滚动提示动画 */
        @keyframes scrollHint {
            0% { transform: translateX(0); }
            25% { transform: translateX(10px); }
            50% { transform: translateX(0); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
        
        /* 首次加载时的滚动提示 - 已禁用 */
        .code-wrapper.has-h-scroll::before {
            content: '';
            display: none;
        }
        
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(10px); }
            10% { opacity: 1; transform: translateY(0); }
            20% { opacity: 1; transform: translateX(-5px); }
            30% { opacity: 1; transform: translateX(5px); }
            40% { opacity: 1; transform: translateX(-5px); }
            50% { opacity: 1; transform: translateX(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(10px); }
        }

        .eval-container-wrapper {
            grid-column: 2;
            grid-row: 2;
            overflow: hidden;
            max-height: 100%;
            height: calc(34.7vh + 40px); /* 进一步增加右下高度 */
            align-self: start; 
        }

        .eval-container {
            position: relative;
            height: 100%;
            display: flex;
            flex-direction: column;
            max-height: 100%;
        }

        /* Reference Preview 交互式图容器：白色背景、无滚动、充满父容器 */
        .eval-container .generated-code.has-interactive-chart {
            background: #ffffff;
            padding: 0;
            height: 100%;
            max-height: 100%;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .eval-container .generated-code.has-interactive-chart .vega-embed {
            width: 90% !important;
            height: 90% !important;
            margin: auto;
        }

        .eval-summary {
            background: #1f2937;
            border-radius: 12px;
            padding: 1rem;
            color: #f3f4f6;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .eval-summary:hover {
            background: #2d3748;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
            transform: translateY(-2px);
        }

        .eval-details {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 5;
        }

        .eval-container:hover .eval-details {
            opacity: 1;
            visibility: visible;
        }

        .eval-passed {
            color: #10b981;
        }

        .eval-failed {
            color: #ef4444;
        }

        .query-info {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            padding: 12px;
            margin-top: 10px;
            backdrop-filter: blur(var(--glass-blur));
            border: var(--card-border);
        }

        .query-details {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .query-item {
            flex: 1;
            min-width: 200px;
        }

        .query-label {
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 3px;
        }

                    .query-value {
                width: 100%;
                padding: 0.5rem;
                font-size: 0.9rem;
                border: 2px solid #e5e7eb;
                border-radius: 12px;
                background: rgba(255, 255, 255, 0.8);
                font-family: 'Inter', sans-serif;
                word-break: break-word;
                color: #374151;
            }

        .back-to-home {
            margin-top: 20px;
        }

        /* 加载动画 */
        .loading {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top: 4px solid var(--accent-color);
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 覆盖highlight.js的样式 */
        .hljs {
            background: transparent !important;
            background-color: transparent !important;
            color: #f3f4f6 !important;
            height: 100% !important;
            display: block !important;
        }
        
        /* 确保language-python代码元素占满容器高度 */
        .generated-code code.language-python {
            height: 100% !important;
            display: block !important;
            width: 100% !important;
        }
        
        /* 确保代码区域内的所有元素都没有背景色 */
        .generated-code * {
            background: transparent !important;
            background-color: transparent !important;
        }
        
        /* Chart区域特殊样式 - 当显示图片时 */
        #chartArea img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        #chartArea img:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }
        
        /* Chart区域在显示图片时的样式调整 */
        #chartArea.has-image {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            height: 450px; /* 进一步减小图片容器高度 */
            max-height: 450px;
            overflow-y: auto; /* 如果图片太大，允许滚动 */
            overflow-x: auto; /* 图片过宽时允许水平滚动 */
            white-space: nowrap; /* 防止图片换行 */
            background-color: #ffffff;
            border-radius: 8px;
        }

        /* Reference Preview 图片自适应容器，避免滚动条 */
        .eval-container .generated-code.has-image {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            height: 100%;
            max-height: 100%;
            overflow: hidden; /* 不出现滚动条 */
            background-color: #ffffff;
            border-radius: 8px;
        }

        .eval-container .generated-code.has-image img {
            width: auto;
            height: auto;
            max-width: 80%;
            max-height: 80%;
            object-fit: contain; /* 完整显示图片 */
            display: block;
        }
        
        /* 为chartArea添加自定义滚动条样式 */
        #chartArea.has-image::-webkit-scrollbar,
        #chartArea.has-interactive-chart::-webkit-scrollbar {
            width: 6px;
            height: 6px;
            background: transparent;
        }
        
        #chartArea.has-image::-webkit-scrollbar-track,
        #chartArea.has-interactive-chart::-webkit-scrollbar-track {
            background: rgba(31, 41, 55, 0.5);
            border-radius: 2px;
        }
        
        #chartArea.has-image::-webkit-scrollbar-thumb,
        #chartArea.has-interactive-chart::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.5);
            border-radius: 2px;
        }
        
        #chartArea.has-image::-webkit-scrollbar-thumb:hover,
        #chartArea.has-interactive-chart::-webkit-scrollbar-thumb:hover {
            background: rgba(156, 163, 175, 0.7);
        }
        
        /* 交互式图表样式 */
        #chartArea.has-interactive-chart {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0;
            height: 100%;
            max-height: none;
            overflow: hidden;
            background-color: #ffffff;
            border-radius: 8px;
        }
        
        /* Vega-Embed容器样式 */
        #vis {
            width: 100%;
            height: 100%;
            margin: 0;
            background-color: #ffffff;
            border-radius: 8px;
        }
        
        #chartArea.has-interactive-chart #vis {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        /* 图片放大模态框样式 */
        .image-modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
        }
        
        .image-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .image-modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .image-modal img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            cursor: default;
            background-color: #ffffff;
        }
        
        /* 图片缩放控制按钮样式 */
        .image-zoom-controls {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 10001;
            transition: all 0.3s ease;
        }
        
        .image-zoom-btn {
            background: rgba(255, 255, 255, 0.9);
            color: #1a1a1a;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .image-zoom-btn:hover {
            background: #fff;
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }
        
        .image-zoom-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .image-modal-close {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            color: #1a1a1a;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;

        .image-modal-close:hover {
            background: #fff;
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);

        /* 滚动条美化 - 全局滚动条样式 */
        ::-webkit-scrollbar { 
            width: 6px; 
            height: 6px;
            background: transparent; 
        }
        
        ::-webkit-scrollbar-thumb { 
            background: rgba(255, 255, 255, 0.2); 
            border-radius: 3px; 
        }
        
        ::-webkit-scrollbar-thumb:hover { 
            background: rgba(255, 255, 255, 0.3); 
        }
        
        /* 响应式设计 */
        @media (max-width: 992px) {
            .results-layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto;
                height: auto;

            .chart-container {

                align-self: auto; /* 重置对齐方式 */

                margin-top: 0; /* 重置上边距 */
            }
        }
    </style>
</head>

    <!-- 进度显示组件 - 右上角固定位置 -->

    <!-- 图片放大模态框 -->

                <i class="fa-solid fa-xmark"></i>
            </button>
            <img id="modalImage" src="" alt="Enlarged image">
        </div>
    </div>

    <script>
        // 获取URL参数
        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // 连接到SSE进度流
        function connectToProgressStream() {
            const sessionId = getUrlParam('session_id');
            if (!sessionId) {
                console.error('No session ID provided');
                return;
            }

            // 显示进度覆盖层
            const progressOverlay = document.getElementById('progressOverlay');
            const progressContent = document.getElementById('progressContent');
            
            progressOverlay.style.display = 'block';
            progressContent.textContent = 'Connecting to progress stream...';

            // 在图表区域显示加载提示
            const chartArea = document.getElementById('chartArea');
            if (chartArea) {
                chartArea.className = 'generated-code';
                chartArea.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div>Generating visualization chart...</div></div>';
            }

            const eventSource = new EventSource(`/progress/${sessionId}`);
            let connectionEstablished = false;
            
            eventSource.onopen = function(event) {
                console.log('SSE connection opened:', event);
                connectionEstablished = true;
                const timestamp = new Date().toLocaleTimeString();
                const lines = progressContent.textContent.split('\n').filter(line => line.trim() !== '');
                lines.push(`[${timestamp}] ✅ Connected to server`);
                if (lines.length > 6) lines.shift();
                progressContent.textContent = lines.join('\n');
            };
            
            eventSource.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    console.log('Progress update:', data);
                    
                    // 更新进度显示
                    updateProgressDisplay(data);
                    
                    // 处理不同类型的进度更新
                    handleProgressUpdate(data);
                    
                    // 如果流结束，关闭连接
                    if (data.step === 'end' || data.step === 'timeout' || data.step === 'complete' || data.step === 'error') {
                        eventSource.close();
                        
                        // 延迟隐藏进度覆盖层
                        setTimeout(() => {
                            progressOverlay.style.display = 'none';
                        }, 3000);
                    }
                } catch (e) {
                    console.error('Error parsing progress data:', e, 'Raw data:', event.data);
                    const timestamp = new Date().toLocaleTimeString();
                    const lines = progressContent.textContent.split('\n').filter(line => line.trim() !== '');
                    lines.push(`[${timestamp}] ❌ Error parsing data: ${e.message}`);
                    if (lines.length > 6) lines.shift();
                    progressContent.textContent = lines.join('\n');
                }
            };
            
            eventSource.onerror = function(error) {
                console.error('SSE Error:', error);
                const timestamp = new Date().toLocaleTimeString();
                const lines = progressContent.textContent.split('\n').filter(line => line.trim() !== '');
                
                if (!connectionEstablished) {
                    lines.push(`[${timestamp}] ❌ Failed to connect to server`);
                } else {
                    lines.push(`[${timestamp}] ⚠️ Connection interrupted`);
                }
                
                if (lines.length > 6) lines.shift();
                progressContent.textContent = lines.join('\n');
                
                eventSource.close();
            };
            
            // 设置超时检查
            setTimeout(() => {
                if (!connectionEstablished) {
                    console.error('Connection timeout');
                    eventSource.close();
                    const timestamp = new Date().toLocaleTimeString();
                    const lines = progressContent.textContent.split('\n').filter(line => line.trim() !== '');
                    lines.push(`[${timestamp}] ⏰ Connection timeout`);
                    if (lines.length > 6) lines.shift();
                    progressContent.textContent = lines.join('\n');
                }
            }, 10000); // 10秒超时
        }

        // 处理进度更新
        function handleProgressUpdate(data) {
            // 处理代码更新
            if (data.step === 'code_update' && data.data) {
                setCodeWithHighlight(data.data);
            }
            
            // 处理迭代更新
            if (data.step === 'code_iteration' && data.data) {
                const iterData = data.data;
                setCodeWithHighlight(iterData.code);
                // 始终在代码区域显示迭代弹窗
                showIterationPopup('codeArea', iterData.iteration);
                // 按需移除：迭代阶段不再更新图表，也不显示图表区域的迭代弹窗
            }
            
            // 处理最终结果
            if (data.step === 'complete' && data.data) {
                updateFinalResults(data.data);
                // 仅代码区域显示最终结果弹窗；图表区域不显示
                showFinalResultPopup('codeArea');
            }
        }
        
        // 更新进度显示
        function updateProgressDisplay(data) {
            const progressContent = document.getElementById('progressContent');
            const timestamp = data.timestamp || new Date().toLocaleTimeString();
            
            let statusIcon = '';
            let statusClass = '';
            
            switch (data.status) {
                case 'processing':
                    statusIcon = '⏳';
                    statusClass = 'processing';
                    break;
                case 'success':
                    statusIcon = '✅';
                    statusClass = 'success';
                    break;
                case 'error':
                    statusIcon = '❌';
                    statusClass = 'error';
                    break;
                default:
                    statusIcon = 'ℹ️';
                    statusClass = 'info';
            }
            
            // 限制显示的进度条目数量（最多显示6条）
            const lines = progressContent.textContent.split('\n').filter(line => line.trim() !== '');
            if (lines.length >= 6) {
                lines.shift(); // 移除最老的一条
            }
            lines.push(`[${timestamp}] ${statusIcon} ${data.data || data.step}`);
            
            // 每行显示，用换行符连接
            progressContent.textContent = lines.join('\n');
            
            // 自动滚动到底部
            progressContent.scrollTop = progressContent.scrollHeight;
        }

        // 更新代码显示
        function setCodeWithHighlight(code) {
            const codeArea = document.getElementById('codeArea');
            // 确保代码区域有正确的结构用于Python语法高亮
            codeArea.innerHTML = `<code class="language-python">${escapeHtml(code)}</code>`;
            // 应用Python语法高亮
            hljs.highlightElement(codeArea.querySelector('code'));
            
            // 确保代码区域内的所有元素都没有背景色
            const codeElements = codeArea.querySelectorAll('*');
            codeElements.forEach(element => {
                element.style.background = 'transparent';
                element.style.backgroundColor = 'transparent';
            });
            
            // 检查代码是否需要水平滚动
            setTimeout(() => {
                if (codeArea.scrollWidth > codeArea.clientWidth) {
                    console.log('代码加载后需要水平滚动 - 内容宽度:', codeArea.scrollWidth, '容器宽度:', codeArea.clientWidth);
                    const codeWrapper = document.querySelector('.code-wrapper');
                    if (codeWrapper) {
                        codeWrapper.classList.add('has-h-scroll');
                    }
                }
            }, 100);
        }

        // 更新图表显示
        function updateChartDisplay(chartPath) {
            const chartArea = document.getElementById('chartArea');
            
            // 确保背景为白色
            chartArea.style.backgroundColor = '#ffffff';
            
            // 检查是否是JSON路径
            if (chartPath.endsWith('.json') || chartPath.endsWith('.vega.json')) {
                            // 优先使用vega-lite交互式图表
            chartArea.className = 'generated-code has-interactive-chart';
            // 保存JSON路径以供下载按钮使用
            chartArea.setAttribute('data-json-path', chartPath);
            chartArea.innerHTML = '<div id="vis" style="width:100%; height:100%;"></div>';
            loadInteractiveChart(chartPath);
            } else {
                // 假设是图像路径
                chartArea.className = 'generated-code has-image';
                chartArea.innerHTML = `<img src="${chartPath}" alt="chart" onload="addImageClickEvent(this);" style="background-color: #ffffff;">`;
            }
        }

        // 加载交互式图表
        function loadInteractiveChart(jsonPath) {
            if (!jsonPath) {
                console.error('No JSON path provided for interactive chart');
                return;
            }
            
            console.log('Loading interactive chart from:', jsonPath);
            
            // 获取图表容器
            const chartArea = document.getElementById('chartArea');
            if (!chartArea) {
                console.error('Chart area element not found');
                return;
            }
            
            // 创建或获取可视化容器
            let visElement = document.getElementById('vis');
            if (!visElement) {
                visElement = document.createElement('div');
                visElement.id = 'vis';
                chartArea.innerHTML = '';
                chartArea.appendChild(visElement);
            }
            
            // 添加加载指示器
            visElement.innerHTML = '<div class="loading">Loading interactive chart...</div>';
            chartArea.className = 'generated-code has-interactive-chart';
            
                                // 设置嵌入选项
                    const embedOptions = {
                        actions: true,  // 显示导出和编辑按钮
                        renderer: 'canvas',  // 使用canvas渲染器以获得更好的性能
                        theme: 'light',  // 使用浅色主题
                        hover: true,  // 启用悬停效果
                        tooltip: true,  // 启用工具提示
                        downloadFileName: 'visualization',  // 下载文件的默认名称
                        background: '#ffffff',  // 确保背景为白色
                        width: 'container',  // 使用容器宽度
                        height: 'container'  // 使用容器高度
                    };
            
            // 加载并嵌入图表
            fetch(jsonPath)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Failed to load chart JSON: ${response.status} ${response.statusText}`);
                    }
                    return response.json();
                })
                .then(spec => {
                    console.log('Chart specification loaded successfully');
                    
                    // 在嵌入前修改规范
                    // 1. 移除threshold相关配置
                    if (spec.encoding && spec.encoding.color && spec.encoding.color.condition && 
                        spec.encoding.color.condition.test && 
                        spec.encoding.color.condition.test.field && 
                        spec.encoding.color.condition.test.gt !== undefined) {
                        console.log('移除threshold条件');
                        delete spec.encoding.color.condition;
                    }
                    
                    // 2. 移除任何params中的threshold或slider相关配置
                    if (spec.params) {
                        spec.params = spec.params.filter(param => {
                            if (param.name && (param.name.includes('threshold') || param.name.includes('slider'))) {
                                console.log('移除参数:', param.name);
                                return false;
                            }
                            return true;
                        });
                    }
                    
                    // 2.1 移除signals中的threshold相关配置
                    if (spec.signals) {
                        spec.signals = spec.signals.filter(signal => {
                            if (signal.name && (signal.name.includes('threshold') || signal.name.includes('slider'))) {
                                console.log('移除信号:', signal.name);
                                return false;
                            }
                            return true;
                        });
                    }
                    
                    // 检测是否为分层图表
                    const isLayered = Array.isArray(spec.layer);
                    
                    // 添加工具提示（分层图表通过 config，单层图表通过 mark）
                    if (!isLayered) {
                        if (typeof spec.mark === 'object') {
                            spec.mark.tooltip = true;
                        } else if (typeof spec.mark === 'string') {
                            spec.mark = {type: spec.mark, tooltip: true};
                        }
                    }
                    
                    if (!spec.config) spec.config = {};
                    if (!spec.config.mark) spec.config.mark = {};
                    spec.config.mark.tooltip = true;
                    
                    // 获取有效的 encoding（分层图表从第一个数据层读取）
                    let effectiveEncoding = spec.encoding;
                    if (isLayered && !effectiveEncoding) {
                        for (const layer of spec.layer) {
                            if (layer.encoding && (layer.encoding.x || layer.encoding.y)) {
                                effectiveEncoding = layer.encoding;
                                break;
                            }
                        }
                    }
                    
                    const hasDiscreteScales = effectiveEncoding && (
                        (effectiveEncoding.x && (effectiveEncoding.x.type === 'nominal' || effectiveEncoding.x.type === 'ordinal')) ||
                        (effectiveEncoding.y && (effectiveEncoding.y.type === 'nominal' || effectiveEncoding.y.type === 'ordinal'))
                    );
                    
                    // 只对非分层的、连续尺度图表添加缩放平移（分层图表顶层 interval 选择会导致重复信号）
                    if (!hasDiscreteScales && !isLayered) {
                        console.log('添加缩放和平移功能');
                        if (!spec.params) spec.params = [];
                        spec.params.push({
                            name: 'grid',
                            select: 'interval',
                            bind: 'scales'
                        });
                    }
                    
                    // 获取顶层 mark 类型（仅单层图表）
                    const topMarkType = !isLayered ? (typeof spec.mark === 'object' ? (spec.mark && spec.mark.type) : spec.mark) : null;
                    
                    if (topMarkType === 'circle') {
                        console.log('为散点图添加交互功能');
                        spec.usermeta = spec.usermeta || {};
                        spec.usermeta.interactive = true;
                    }
                    
                    if (topMarkType === 'bar') {
                        console.log('为柱状图添加高亮效果');
                        if (!spec.config.hover) spec.config.hover = {};
                        spec.config.hover.fill = 'goldenrod';
                        spec.config.hover.stroke = 'black';
                        spec.config.hover.strokeWidth = 2;
                        spec.config.hover.cursor = 'pointer';
                    }
                    
                    // 确保图表有白色背景并适应容器大小
                    if (!spec.config) spec.config = {};
                    if (!spec.config.background) spec.config.background = '#ffffff';
                    if (!spec.config.view) spec.config.view = {};
                    if (!spec.config.view.fill) spec.config.view.fill = '#ffffff';
                    
                    // 设置图表自动调整大小以适应容器
                    spec.width = 'container';
                    spec.height = 'container';
                    spec.autosize = {
                        type: 'fit',
                        contains: 'padding'
                    };
                    
                    // 对于折线图，添加基本的工具提示
                    if (spec.mark === 'line' || (typeof spec.mark === 'object' && spec.mark.type === 'line')) {
                        console.log('为折线图添加工具提示');
                        
                        // 使用基本的工具提示
                        if (typeof spec.mark === 'object') {
                            spec.mark.point = true; // 在数据点上显示点
                            spec.mark.tooltip = true;
                        } else {
                            spec.mark = {type: 'line', point: true, tooltip: true};
                        }
                    }
                    
                    // 7. 确保图表是交互式的
                    if (typeof spec.mark === 'object') {
                        spec.mark.tooltip = true;
                    }
                    
                    // 7.1 处理深层嵌套的threshold引用
                    function removeThresholdReferences(obj) {
                        if (!obj || typeof obj !== 'object') return;
                        
                        // 递归检查对象属性
                        Object.keys(obj).forEach(key => {
                            // 如果属性值是对象或数组，递归处理
                            if (obj[key] && typeof obj[key] === 'object') {
                                removeThresholdReferences(obj[key]);
                            }
                            
                            // 处理引用threshold的表达式字符串
                            if (typeof obj[key] === 'string' && 
                                (obj[key].includes('threshold') || 
                                 obj[key].includes('slider') || 
                                 obj[key].includes('bind'))) {
                                console.log('移除threshold引用:', key, obj[key]);
                                delete obj[key];
                            }
                            
                            // 删除名为threshold的属性
                            if (key === 'threshold' || key.includes('threshold') || key.includes('slider')) {
                                console.log('移除threshold属性:', key);
                                delete obj[key];
                            }
                        });
                    }
                    
                    // 对整个规范进行深度清理
                    removeThresholdReferences(spec);
                    
                    // 8. 添加调试信息
                    console.log('修改后的图表规范:', spec);
                    
                    // 确保 vegaEmbed 可用
                    return window.ensureVegaEmbed().then(() => {
                        // 嵌入Vega-Lite图表
                        return vegaEmbed('#vis', spec, embedOptions);
                    });
                })
                .then(result => {
                    console.log('Chart embedded successfully');
                    
                    // 检查是否有警告消息
                    if (result.view && result.view.warn) {

                        result.view.warn = function(message) {
                            // 忽略所有已知的警告
                            if (message && typeof message === 'string' && 
                                (message.includes('threshold') || 
                                 message.includes('slider') ||
                                 message.includes('Scale bindings') ||
                                 message.includes('continuous domains') ||
                                 message.includes('Dropping "fit') ||
                                 message.includes('discrete width'))) {
                                console.log('忽略警告:', message);
                                return;
                            }
                            // 其他警告正常处理
                            originalWarn.apply(this, arguments);

                    }
                    
                    // 确保Vega图表容器铺满父容器
                    setTimeout(() => {

                .catch(error => {
                    console.error('Error with interactive chart:', error);
                    
                    // 如果是threshold相关错误，尝试再次处理规范并重新加载
                    if (error.message && error.message.includes('threshold')) {
                        console.log('检测到threshold错误，尝试更强大的清理方法');
                        
                        // 重新获取JSON规范
                        fetch(jsonPath)

                                try {
                                    // 将规范转为字符串
                                    let specStr = JSON.stringify(spec);
                                    
                                    // 替换所有包含'threshold'或'slider'的字符串
                                    specStr = specStr.replace(/"threshold[^"]*"/g, '""');
                                    specStr = specStr.replace(/"slider[^"]*"/g, '""');
                                    
                                    // 替换可能的引用
                                    specStr = specStr.replace(/"\{[^}]*threshold[^}]*\}"/g, '""');
                                    
                                    // 将字符串转回对象
                                    const cleanedSpec = JSON.parse(specStr);
                                    
                                                            // 重新嵌入图表，使用最简单的选项
                        const simpleOptions = {
                            actions: true,
                            renderer: 'canvas',
                            theme: 'light',

                                    // 确保 vegaEmbed 可用
                                    return window.ensureVegaEmbed().then(() => {

                                }

                                fallbackToStaticImage();

                    } else {

                    // 回退到静态图像的函数

        function openImageModal(imageSrc) {
            const modal = document.getElementById('imageModal');
            const modalImage = document.getElementById('modalImage');
            
            modalImage.src = imageSrc;
            modal.classList.add('active');
            
            // 重置缩放状态

            document.body.style.overflow = 'hidden';

        // 关闭图片模态框
        function closeModalDirectly(event) {
            if (event) {
                event.stopPropagation();
            }
            
            const modal = document.getElementById('imageModal');
            modal.classList.remove('active');
            
            // 恢复页面滚动
            document.body.style.overflow = '';

            document.removeEventListener('keydown', handleEscapeKey);
            modal.removeEventListener('wheel', handleImageZoom);

        function closeImageModal(event) {

            if (event && (
                event.target.tagName === 'IMG' || 
                event.target.closest('.image-modal-close')
            )) {
                return;
            }
            
            // 点击背景区域关闭模态框

        // 设置代码区域的滚动功能
        function setupCodeScrolling() {
            const codeArea = document.getElementById('codeArea');
            if (!codeArea) return;
            
            // 添加滚动事件监听
            codeArea.addEventListener('scroll', function() {
                // 可以添加滚动时的效果，比如滚动条高亮等
                codeArea.classList.add('scrolling');
                
                // 检查是否有水平溢出，如果有则显示水平滚动指示器
                const codeWrapper = document.querySelector('.code-wrapper');
                if (codeWrapper && codeArea.scrollWidth > codeArea.clientWidth) {
                    codeWrapper.classList.add('has-h-scroll');
                    console.log('水平滚动条已启用 - 内容宽度:', codeArea.scrollWidth, '容器宽度:', codeArea.clientWidth);
                } else if (codeWrapper) {
                    codeWrapper.classList.remove('has-h-scroll');
                }
                
                // 滚动结束后移除高亮效果
                clearTimeout(codeArea.scrollTimer);
                codeArea.scrollTimer = setTimeout(function() {
                    codeArea.classList.remove('scrolling');
                }, 300);
            });
            
            // 优化水平滚动体验
            codeArea.addEventListener('wheel', function(e) {
                // 如果按住Shift键或者检测到代码内容宽度超过容器宽度
                if (e.shiftKey || (codeArea.scrollWidth > codeArea.clientWidth && Math.abs(e.deltaX) < Math.abs(e.deltaY))) {
                    // 将垂直滚动转换为水平滚动
                    e.preventDefault();
                    codeArea.scrollLeft += e.deltaY;
                    
                    // 添加滚动动画效果
                    codeArea.style.scrollBehavior = 'smooth';
                    setTimeout(() => {
                        codeArea.style.scrollBehavior = 'auto';
                    }, 300);
                }
            });
            
            // 初始化时检查是否需要显示水平滚动指示器
            function checkHorizontalScroll() {
                console.log('检查水平滚动 - 内容宽度:', codeArea.scrollWidth, '容器宽度:', codeArea.clientWidth);
                
                if (codeArea.scrollWidth > codeArea.clientWidth) {
                    console.log('需要水平滚动 - 差值:', codeArea.scrollWidth - codeArea.clientWidth);
                    const codeWrapper = document.querySelector('.code-wrapper');
                    if (codeWrapper) {
                        codeWrapper.classList.add('has-h-scroll');
                        
                        // 不显示滚动提示弹窗
                    }
                }
            }
            
            // 在代码加载后和窗口调整大小时检查
            setTimeout(checkHorizontalScroll, 500);
            setTimeout(checkHorizontalScroll, 1000); // 再次检查，以防代码加载延迟
            window.addEventListener('resize', checkHorizontalScroll);
            
            // 监听代码内容变化
            const observer = new MutationObserver(function(mutations) {
                checkHorizontalScroll();
            });
            
            observer.observe(codeArea, { 
                childList: true, 
                subtree: true, 
                characterData: true 
            });
        }
        
        // 更新图片缩放
        function updateImageZoom() {
            const modalImage = document.getElementById('modalImage');
            modalImage.style.transform = `scale(${currentZoom})`;
        }
        
        // 处理鼠标滚轮缩放
        function handleImageZoom(event) {
            event.preventDefault();
            
            // 根据滚轮方向调整缩放级别
            if (event.deltaY < 0) {
                // 向上滚动，放大
                currentZoom = Math.min(currentZoom * 1.1, maxZoom);
            } else {
                // 向下滚动，缩小
                currentZoom = Math.max(currentZoom / 1.1, minZoom);
            }
            
            updateImageZoom();
        }

        // 缩放图片函数
        function zoomImage(factor, event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }
            
            const newZoom = currentZoom * factor;
            if (newZoom >= minZoom && newZoom <= maxZoom) {
                currentZoom = newZoom;
                updateImageZoom();
            }
        }
